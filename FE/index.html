<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Mock Interviewer</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 30px;
      background-color: #f9f9f9;
    }
    header {
      background-color: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 5px;
      margin-bottom: 30px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 8px;
    }
    button:hover {
      background-color: #0056b3;
    }
    hr {
      margin: 30px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
    h2 {
      margin-top: 10px;
      color: #333;
      text-align: center;
    }
    p {
      text-align: center;
      color: green;
      font-size: 14px;
    }
    #skills-box {
      background-color: #eef6ff;
      border-left: 5px solid #007bff;
      padding: 10px 15px;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 15px;
      color: #333;
    }
    .section {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>AI Mock Interviewer</h1>
</header>

<!-- Register Section -->
<div id="register-section" class="section">
  <h2>Register</h2>
  <input type="text" id="username" placeholder="Enter Username" />
  <input type="email" id="email" placeholder="Enter Email" />
  <input type="password" id="password" placeholder="Enter Password" />
  <button id="register-btn">Register</button>
  <p id="register-message"></p>
</div>

<hr />

<!-- Login Section -->
<div id="login-section" class="section">
  <h2>Login</h2>
  <input type="email" id="login-email" placeholder="Enter Email" />
  <input type="password" id="login-password" placeholder="Enter Password" />
  <button id="login-btn">Login</button>
  <p id="login-message"></p>
</div>

<hr />

<!-- Resume Upload Section -->
<div class="section">
  <h2>Upload Resume</h2>
  <input type="file" id="resume-file" accept=".pdf,.doc,.docx,.txt" />
  <button id="upload-resume-btn">Upload Resume</button>
  <p id="resume-message"></p>
  <div id="skills-box" style="display:none;"></div>
</div>

<hr />

<!-- Language & Difficulty Section -->
<div class="section">
  <h2>Select Language & Difficulty</h2>
  <select id="language-select">
    <option value="Python">Python</option>
    <option value="Java">Java</option>
    <option value="C++">C++</option>
  </select>
  <select id="difficulty-select">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
  </select>
  <button id="generate-question-btn">Generate Question</button>
  <p id="generated-question"></p>
</div>

<hr />

<!-- Interview Section -->
<div class="section">
  <h2>Interview Question</h2>
  <p id="question-text"><strong>Q:</strong> Loading question...</p>
  <textarea id="candidate-response" rows="5" placeholder="Type your answer here..."></textarea>
  <button id="start-voice-btn">🎙️ Speak Answer</button>
  <input type="text" id="candidate-name" placeholder="Enter your name" />
  <button id="submit-response-btn">Submit Response</button>
  <button id="next-question-btn">Next Question</button>
  <p id="response-message"></p>
</div>

<hr />

<!-- Logout Section -->
<div class="section">
  <button id="logout-btn">Logout</button>
  <p id="logout-message"></p>
</div>

<script src="script.js"></script>
</body>
</html>
